server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: lpsx
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.1.165:3306/lpsx?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:your-password}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isActive
      logic-delete-value: 0
      logic-not-delete-value: 1

# JWT 配置
jwt:
  secret: lpsx2026secretkey32bytesLong!
  expiration: 604800000

# 微信小程序配置
wechat:
  appid: your-wechat-appid
  secret: your-wechat-secret
